<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>


    <nav class="navbar navbar-dark bg-primary">
        <div class="container">

            <a class="navbar-brand" href="#">
                Student Management System
            </a>

            <div>
                <a href="dashboard.html" class="btn btn-light btn-sm me-2">
                    Dashboard
                </a>

                <a href="student-profile.html" class="btn btn-warning btn-sm">
                    Profile

            </div>

    </nav>


    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2>Students</h2>

        </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">

                    <img src="https://picsum.photos/300/200?1" class="card-img-top" alt="Student">
                    <div class="card-body text-center">
                        <h5 class="card-title">Abdul Moiz</h5>
                        <p class="card-text">Batch: 2026</p>
                        <a href="student-profile.html" class="btn btn-primary w-100">
                            View Profile
                        </a>
                    </div>
                </div>
            </div>


            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card h-100 shadow">
                    <img src="https://picsum.photos/300/200?2" class="card-img-top" alt="Student">
                    <div class="card-body text-center">
                        <h5 class="card-title">Ahmed Raza</h5>
                        <p class="card-text">Batch: 2025</p>
                        <button class="btn btn-primary w-100">
                            View Profile
                        </button>
                    </div>
                </div>
            </div>


            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card h-100 shadow">
                    <img src="https://picsum.photos/300/200?3" class="card-img-top" alt="Student">
                    <div class="card-body text-center">
                        <h5 class="card-title">Sara Ahmed</h5>
                        <p class="card-text">Batch: 2024</p>
                        <button class="btn btn-primary w-100">
                            View Profile
                        </button>
                    </div>
                </div>
            </div>


            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card h-100 shadow">
                    <img src="https://picsum.photos/300/200?4" class="card-img-top" alt="Student">
                    <div class="card-body text-center">
                        <h5 class="card-title">Hamza Ali</h5>
                        <p class="card-text">Batch: 2026</p>
                        <button class="btn btn-primary w-100">
                            View Profile
                        </button>
                    </div>
                </div>
            </div>


            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card h-100 shadow">
                    <img src="https://picsum.photos/300/200?5" class="card-img-top" alt="Student">
                    <div class="card-body text-center">
                        <h5 class="card-title">Zain Malik</h5>
                        <p class="card-text">Batch: 2025</p>
                        <button class="btn btn-primary w-100">
                            View Profile
                        </button>
                    </div>
                </div>
            </div>


            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card h-100 shadow">
                    <img src="https://picsum.photos/300/200?6" class="card-img-top" alt="Student">
                    <div class="card-body text-center">
                        <h5 class="card-title">Usman Khan</h5>
                        <p class="card-text">Batch: 2024</p>
                        <button class="btn btn-primary w-100">
                            View Profile
                        </button>
                    </div>
                </div>
            </div>


            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card h-100 shadow">
                    <img src="https://picsum.photos/300/200?7" class="card-img-top" alt="Student">
                    <div class="card-body text-center">
                        <h5 class="card-title">Ayesha Noor</h5>
                        <p class="card-text">Batch: 2026</p>
                        <button class="btn btn-primary w-100">
                            View Profile
                        </button>
                    </div>
                </div>
            </div>


            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card h-100 shadow">
                    <img src="https://picsum.photos/300/200?8" class="card-img-top" alt="Student">
                    <div class="card-body text-center">
                        <h5 class="card-title">Fatima Ali</h5>
                        <p class="card-text">Batch: 2025</p>
                        <button class="btn btn-primary w-100">
                            View Profile
                        </button>
                    </div>
                </div>
            </div>

        </div>

    </div>


    <div class="modal fade" id="addStudentModal" tabindex="-1" aria-labelledby="addStudentModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">


                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="addStudentModalLabel">
                        Add New Student
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close">
                    </button>
                </div>


                <div class="modal-body">

                    <form>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Student Name</label>
                                <input type="text" class="form-control" placeholder="Enter student name">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Age</label>
                                <input type="number" class="form-control" placeholder="Enter age">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Batch</label>
                                <select class="form-select">
                                    <option selected>Select Batch</option>
                                    <option>2024</option>
                                    <option>2025</option>
                                    <option>2026</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" placeholder="Enter email">
                            </div>

                            <div class="col-12 mb-3">
                                <label class="form-label">Image URL</label>
                                <input type="text" class="form-control" placeholder="https://example.com/image.jpg">
                            </div>

                        </div>

                    </form>

                </div>


                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cancel
                    </button>

                    <button type="button" class="btn btn-primary">
                        Save Student
                    </button>
                </div>

            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
