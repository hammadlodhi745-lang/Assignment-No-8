            </div>

        </div>

    </div>


    <div class="modal fade" id="addStudentModal" tabindex="-1" aria-labelledby="addStudentModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">


                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="addStudentModalLabel">
                        Add New Student
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close">
                    </button>
                </div>


                <div class="modal-body">

                    <form>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Student Name</label>
                                <input type="text" class="form-control" placeholder="Enter student name">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Age</label>
                                <input type="number" class="form-control" placeholder="Enter age">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Batch</label>
                                <select class="form-select">
                                    <option selected>Select Batch</option>
                                    <option>2024</option>
                                    <option>2025</option>
                                    <option>2026</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" placeholder="Enter email">
                            </div>

                            <div class="col-12 mb-3">
                                <label class="form-label">Image URL</label>
                                <input type="text" class="form-control" placeholder="https://example.com/image.jpg">
                            </div>

                        </div>

                    </form>

                </div>


                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cancel
                    </button>

                    <button type="button" class="btn btn-primary">
                        Save Student
                    </button>
                </div>

            </div>
        </div>
    </div>


    <div class="offcanvas offcanvas-start" tabindex="-1" id="filterCanvas">

        <div class="offcanvas-header">
            <h5 class="offcanvas-title">FILTER STUDENTS</h5>

            <button type="button" class="btn-close" data-bs-dismiss="offcanvas">
            </button>
        </div>

        <div class="offcanvas-body">

            <form>


                <div class="mb-3">
                    <label class="form-label fw-bold">Batch</label>

                    <select class="form-select">
                        <option selected>Select Batch</option>
                        <option>2024</option>
                        <option>2025</option>
                        <option>2026</option>
                    </select>
                </div>


                <div class="mb-3">
                    <label class="form-label fw-bold">Gender</label>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="gender" id="male">

                        <label class="form-check-label" for="male">
                            Male
                        </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="gender" id="female">

                        <label class="form-check-label" for="female">
                            Female
                        </label>
                    </div>

                </div>


                <div class="mb-3">
                    <label class="form-label fw-bold">
                        Age:
                        <span id="ageValue">16</span>
                    </label>

                    <input type="range" class="form-range" min="16" max="50" value="16" id="ageRange"
                        oninput="ageValue.innerText=this.value">
                </div>


                <div class="mb-4">
                    <label class="form-label fw-bold">Fees</label>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="fees" id="paid">

                        <label class="form-check-label" for="paid">
                            Paid
                        </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="fees" id="unpaid">

                        <label class="form-check-label" for="unpaid">
                            Unpaid
                        </label>
                    </div>

                </div>


                <button type="button" class="btn btn-primary w-100" data-bs-dismiss="offcanvas">
                    Apply
                </button>

            </form>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
